# HOW IT WORKS
# ─────────────
# GitHub spins up a free Ubuntu VM every 4 hours. It checks out your repo
# (including the committed data/dedupe.db), runs one full
# fetch → process → blog → push cycle, then commits the updated DB
# and any new posts back to main so deduplication persists next run.
#
# NO CREDIT CARD. NO SERVER. NO SLEEP TIMEOUTS. FREE FOREVER.
# Public repo = unlimited Actions minutes (no 2000 min/month cap).
# =============================================================================

name: PhantomFeed — Cybersecurity News Automation

on:
  schedule:
    - cron: '0 */4 * * *'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'cycle'
        type: choice
        options:
          - cycle
          - seed
          - blog
          - status

concurrency:
  group: phantomfeed-cycle
  cancel-in-progress: false

jobs:
  run:
    name: PhantomFeed Cycle
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system fonts
        run: |
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu-core fonts-liberation

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write .env from secrets
        run: |
          cat > .env << EOF
          NEWSAPI_KEY=${{ secrets.NEWSAPI_KEY }}
          NVD_API_KEY=${{ secrets.NVD_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          HF_API_TOKEN=${{ secrets.HF_API_TOKEN }}
          GITHUB_TOKEN=${{ secrets.GH_PAT }}
          GITHUB_REPO=${{ github.repository }}
          EOF

      - name: Prepare directories
        run: mkdir -p data out logs blog

      - name: Run PhantomFeed
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
        run: |
          MODE="${{ github.event.inputs.mode || 'cycle' }}"
          echo "Mode: $MODE"
          case "$MODE" in
            seed)   python cli_v2.py seed ;;
            blog)   python cli_v2.py blog ;;
            status) python cli_v2.py status ;;
            *)      python cli_v2.py start --live ;;
          esac

      - name: Commit updated data to main
        run: |
          git config user.name  "PhantomFeed Bot"
          git config user.email "bot@codexploit.in"
          git add data/dedupe.db 2>/dev/null || true
          git add out/           2>/dev/null || true
          git add status.json    2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing new this cycle."
          else
            TS=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "PhantomFeed auto-update — $TS"
            git push origin main
            echo "Pushed updated data to main"
          fi

      - name: Run summary
        if: always()
        run: |
          python cli_v2.py status 2>/dev/null || true
          ls blog/ 2>/dev/null || true
